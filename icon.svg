(()=>{'use strict';
const VERSION='5.0.0',KEY='ascensionYlinorSaveV5';
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
const uid=()=>crypto?.randomUUID?.()||`${Date.now()}-${Math.random()}`;
const SKILLS=[
 ['power','⚔','Puissance','Force, port de charges, travaux physiques.'],
 ['resistance','🛡','Résistance','Endurance, effort prolongé et constance.'],
 ['precision','🎯','Précision','Minutie, dessin, cuisine et bricolage fin.'],
 ['reflexes','⚡','Réflexes','Réactivité, vitesse et coordination.'],
 ['knowledge','📖','Connaissance','Apprentissage, lecture et préparation.'],
 ['perception','👁','Perception','Observation, attention et sens du détail.'],
 ['will','🔥','Volonté','Discipline, courage et lutte contre la procrastination.'],
 ['empathy','🤝','Empathie','Écoute, relations et aide apportée.'],
 ['luck','🍀','Chance','Ouverture aux occasions et défis inattendus.'],
 ['intuition','✦','Intuition','Créativité, imagination et décisions instinctives.']
];
const CATEGORIES={
 cleaning:['🧹','Ménage'],cooking:['🍳','Cuisine'],shopping:['🛒','Courses'],home:['🔨','Maison & bricolage'],work:['📚','Travail'],health:['🌿','Santé'],sport:['🏃','Sport'],creation:['🎨','Création'],leisure:['🎲','Loisirs'],social:['🤝','Relations'],admin:['📋','Administratif'],outdoor:['🌱','Extérieur']
};
const LIBRARY=[
 ['Faire son lit','Remettre la chambre en ordre dès le début de la journée.','cleaning','will',1],['Passer l’aspirateur','Aspirer une pièce ou une zone définie.','cleaning','resistance',2],['Passer la serpillière','Nettoyer soigneusement un sol.','cleaning','resistance',2],['Nettoyer la salle de bain','Lavabo, miroir, douche ou baignoire et surfaces.','cleaning','precision',3],['Nettoyer les toilettes','Faire un nettoyage complet et rapide.','cleaning','will',2],['Dépoussiérer une pièce','Meubles, rebords et objets visibles.','cleaning','perception',2],['Changer les draps','Retirer, laver et remettre du linge propre.','cleaning','resistance',2],['Ranger un placard','Trier et organiser un espace fermé.','cleaning','precision',3],['Nettoyer une vitre','Faire disparaître les traces visibles.','cleaning','precision',2],['Vider les poubelles','Rassembler et sortir les déchets.','cleaning','will',1],['Nettoyer le frigo','Trier, jeter et laver une partie du réfrigérateur.','cleaning','perception',3],['Lancer une machine','Trier le linge et lancer un cycle adapté.','cleaning','precision',1],['Plier et ranger le linge','Finaliser complètement une lessive.','cleaning','will',2],['Ranger pendant 15 minutes','Choisir une zone et avancer sans chercher la perfection.','cleaning','will',1],
 ['Préparer un repas maison','Cuisiner un plat complet plutôt que commander.','cooking','precision',2],['Tester une nouvelle recette','Essayer une préparation encore jamais réalisée.','cooking','intuition',3],['Préparer des portions','Cuisiner plusieurs repas à l’avance.','cooking','will',3],['Cuisiner des légumes','Intégrer une portion de légumes au repas.','cooking','health',2],['Préparer un petit-déjeuner','Composer quelque chose de simple et nourrissant.','cooking','precision',1],['Nettoyer la cuisine','Plans de travail, évier et vaisselle.','cooking','will',2],['Inventer un repas avec les restes','Éviter le gaspillage grâce à la créativité.','cooking','intuition',2],['Faire un dessert','Réaliser une préparation sucrée maison.','cooking','precision',3],
 ['Préparer une liste de courses','Faire l’inventaire et noter uniquement le nécessaire.','shopping','perception',1],['Faire les courses','Acheter les produits prévus.','shopping','will',2],['Comparer les prix','Choisir les meilleures options pour plusieurs produits.','shopping','knowledge',2],['Acheter des fruits et légumes','Prévoir des aliments frais pour les prochains jours.','shopping','health',1],['Ranger les courses','Tout remettre immédiatement à sa place.','shopping','will',1],
 ['Avancer 30 minutes sur un chantier','Choisir une zone précise et progresser sans se disperser.','home','power',3],['Réparer un petit objet','Diagnostiquer puis effectuer une réparation simple.','home','precision',3],['Trier les outils','Ranger et vérifier le matériel.','home','perception',2],['Mesurer une zone','Prendre et noter des mesures fiables.','home','precision',2],['Nettoyer après les travaux','Libérer et sécuriser la zone.','home','will',2],['Faire une petite finition','Achever un détail laissé en attente.','home','precision',2],['Planifier la prochaine étape','Écrire les trois actions suivantes du chantier.','home','knowledge',1],
 ['Préparer un cours','Avancer sur une séance ou une séquence.','work','knowledge',3],['Corriger des travaux','Traiter un lot défini de productions.','work','precision',3],['Répondre aux messages importants','Traiter les communications prioritaires.','work','empathy',2],['Organiser les documents de travail','Classer fichiers ou papiers.','work','will',2],['Lire un article professionnel','Apprendre quelque chose d’utile pour son métier.','work','knowledge',2],['Préparer le matériel de demain','Anticiper la journée suivante.','work','perception',2],['Faire une tâche repoussée','Choisir celle qui pèse le plus mentalement.','work','will',4],
 ['Boire un grand verre d’eau','Commencer ou reprendre une bonne hydratation.','health','will',1],['Préparer une bouteille d’eau','La garder visible pour la journée.','health','will',1],['Manger un fruit','Ajouter une portion simple au repas.','health','resistance',1],['Prendre une vraie pause','Dix minutes sans écran ni obligation.','health','perception',1],['Se coucher à une heure choisie','Fixer une limite réaliste et la respecter.','health','will',3],['Prendre soin de sa peau','Effectuer une routine simple et adaptée.','health','precision',1],['Aérer la maison','Ouvrir plusieurs fenêtres quelques minutes.','health','perception',1],['Préparer un repas équilibré','Composer une assiette cohérente et rassasiante.','health','knowledge',2],
 ['Faire 20 minutes de vélo elliptique','Maintenir un effort régulier et adapté.','sport','resistance',3],['Faire 10 minutes de mobilité','Mobiliser doucement le corps.','sport','reflexes',1],['Faire une courte marche','Sortir ou se déplacer pendant au moins 15 minutes.','sport','resistance',2],['Faire une séance de renforcement','Travailler quelques mouvements simples.','sport','power',3],['S’étirer 10 minutes','Relâcher les zones tendues sans forcer.','sport','precision',1],['Battre un petit record personnel','Améliorer légèrement une durée ou une distance.','sport','will',4],
 ['Écrire du lore','Développer une idée, un lieu ou un personnage d’Ylinor.','creation','intuition',3],['Créer une battlemap','Avancer sur une carte jouable.','creation','precision',4],['Dessiner pendant 20 minutes','Créer sans obligation de résultat final.','creation','intuition',2],['Améliorer Ascension','Ajouter, tester ou préciser une fonctionnalité.','creation','knowledge',3],['Prendre des photos','Chercher volontairement des cadrages intéressants.','creation','perception',2],['Écrire une page','Rédiger librement ou faire avancer un projet.','creation','intuition',3],['Finaliser une création','Terminer une production déjà bien avancée.','creation','will',4],
 ['Lire 20 pages','Lire sans interruption une partie d’un livre.','leisure','knowledge',2],['Jouer sans culpabiliser','Prendre un vrai temps de loisir choisi.','leisure','intuition',1],['Regarder un film','Choisir et regarder une œuvre attentivement.','leisure','perception',1],['Découvrir une musique','Écouter un album ou artiste inconnu.','leisure','luck',1],['Faire une sortie courte','Changer d’environnement pendant un moment.','leisure','luck',2],['Apprendre les règles d’un jeu','Découvrir un nouveau système ludique.','leisure','knowledge',2],
 ['Envoyer un message à quelqu’un','Prendre spontanément des nouvelles.','social','empathy',1],['Appeler une personne','Avoir une vraie conversation.','social','empathy',2],['Faire un compliment sincère','Exprimer quelque chose de positif et précis.','social','empathy',1],['Proposer une activité','Prendre l’initiative d’un moment partagé.','social','will',2],['Aider quelqu’un','Rendre un service concret.','social','empathy',3],['Écouter sans interrompre','Accorder une attention complète lors d’un échange.','social','perception',2],
 ['Trier cinq papiers','Commencer un classement administratif limité.','admin','will',1],['Payer ou vérifier une facture','Traiter une obligation précise.','admin','precision',2],['Prendre un rendez-vous','Effectuer l’appel ou la réservation nécessaire.','admin','will',2],['Répondre à un courrier','Finaliser une réponse en attente.','admin','knowledge',2],['Sauvegarder des fichiers importants','Créer une copie organisée de documents utiles.','admin','precision',2],
 ['Arroser les plantes','Vérifier leurs besoins avant d’arroser.','outdoor','perception',1],['Ramasser les déchets dehors','Nettoyer une petite zone extérieure.','outdoor','will',2],['Désherber 15 minutes','Avancer sur une zone limitée.','outdoor','resistance',2],['Nettoyer le mobilier extérieur','Faire une remise en état rapide.','outdoor','precision',2],['Observer la météo et planifier','Choisir une tâche adaptée aux conditions.','outdoor','intuition',1]
].map((x,i)=>({id:'lib-'+i,title:x[0],description:x[1],category:x[2],skill:x[3],difficulty:x[4]}));
const DEFAULT={version:VERSION,level:1,xp:0,fragments:100,gold:20,streak:1,completed:0,skills:Object.fromEntries(SKILLS.map(s=>[s[0],0])),tasks:[],journal:[{id:uid(),date:new Date().toISOString(),title:'L’Ascension commence',text:'Le registre des quêtes est ouvert. Chaque tâche accomplie renforcera désormais une compétence.'}],recentSuggestions:[],settings:{dailyCount:5,avoidRepeats:true,balancedSkills:true,enabledCategories:Object.fromEntries(Object.keys(CATEGORIES).map(k=>[k,true]))}};
let state=load(),selectedCategory='all',quick=null;
function clone(x){return JSON.parse(JSON.stringify(x))}function merge(b,x){return {...b,...x,skills:{...b.skills,...(x?.skills||{})},settings:{...b.settings,...(x?.settings||{}),enabledCategories:{...b.settings.enabledCategories,...(x?.settings?.enabledCategories||{})}},tasks:Array.isArray(x?.tasks)?x.tasks:b.tasks,journal:Array.isArray(x?.journal)?x.journal:b.journal,recentSuggestions:Array.isArray(x?.recentSuggestions)?x.recentSuggestions:[]}}
function load(){try{const raw=localStorage.getItem(KEY);if(raw)return merge(clone(DEFAULT),JSON.parse(raw));const old=localStorage.getItem('ascensionYlinorSaveV4');if(old){const v4=JSON.parse(old),m=clone(DEFAULT);m.level=v4.level||1;m.xp=v4.xp||0;m.fragments=v4.souls||100;m.gold=v4.gold||20;m.streak=v4.streak||1;m.completed=v4.completed||0;return m}}catch(e){console.warn(e)}return clone(DEFAULT)}function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function xpNeed(l){return 100+(l-1)*60}function rank(){return ['F','E','D','C','B','A','S'][Math.min(6,Math.floor((state.level-1)/4))]}function skillInfo(id){return SKILLS.find(s=>s[0]===id)||SKILLS[0]}function catInfo(id){return CATEGORIES[id]||['✦','Autre']}function rewards(d){return {xp:20+d*20,fragments:5+d*6,gold:Math.max(1,d)}}function escape(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),2400)}
function addXp(v){state.xp+=v;while(state.xp>=xpNeed(state.level)){state.xp-=xpNeed(state.level);state.level++;toast(`Niveau ${state.level} atteint !`)}}
function enabledLibrary(){return LIBRARY.filter(q=>state.settings.enabledCategories[q.category]!==false)}
function pickSuggestions(count=5,category='all'){
 let pool=enabledLibrary().filter(q=>category==='all'||q.category===category);
 if(state.settings.avoidRepeats)pool=pool.filter(q=>!state.recentSuggestions.includes(q.id));
 if(pool.length<count)pool=enabledLibrary().filter(q=>category==='all'||q.category===category);
 const chosen=[];
 if(state.settings.balancedSkills){const shuffled=[...SKILLS].sort(()=>Math.random()-.5);for(const s of shuffled){const options=pool.filter(q=>q.skill===s[0]&&!chosen.includes(q));if(options.length)chosen.push(options[Math.floor(Math.random()*options.length)]);if(chosen.length>=count)break}}
 while(chosen.length<count&&pool.length){const q=pool[Math.floor(Math.random()*pool.length)];if(!chosen.includes(q))chosen.push(q);else if(chosen.length>=pool.length)break}
 state.recentSuggestions=[...chosen.map(q=>q.id),...state.recentSuggestions].slice(0,25);return chosen;
}
function addFromLibrary(q,period='daily'){if(state.tasks.some(t=>!t.done&&t.sourceId===q.id)){toast('Cette quête est déjà active');return}state.tasks.push({id:uid(),sourceId:q.id,title:q.title,description:q.description,category:q.category,skill:q.skill,difficulty:q.difficulty,period,done:false,created:new Date().toISOString()});toast('Quête ajoutée');render()}
function completeTask(id){const t=state.tasks.find(x=>x.id===id);if(!t||t.done)return;t.done=true;t.completedAt=new Date().toISOString();const r=rewards(t.difficulty);addXp(r.xp);state.fragments+=r.fragments;state.gold+=r.gold;state.completed++;state.skills[t.skill]=(state.skills[t.skill]||0)+t.difficulty*3;state.journal.push({id:uid(),date:new Date().toISOString(),title:`Quête accomplie : ${t.title}`,text:`+${r.xp} XP, +${r.fragments} fragments et ${skillInfo(t.skill)[2]} +${t.difficulty*3}.`});toast(`+${r.xp} XP · +${r.fragments} fragments`);render()}
function taskMarkup(t){const [ci,cn]=catInfo(t.category),[si,,sn]=skillInfo(t.skill),r=rewards(t.difficulty);return `<div class="task-card ${t.done?'done':''}"><button class="task-check" data-complete="${t.id}">${t.done?'✓':'○'}</button><div><h4>${escape(t.title)}</h4><p>${escape(t.description||'')}</p><div class="task-meta"><span class="tag">${ci} ${cn}</span><span class="tag">${sn}</span><span class="tag">${'★'.repeat(t.difficulty)}</span><span class="tag">+${r.xp} XP</span></div></div><div class="task-actions"><button class="icon-button" data-delete="${t.id}" title="Supprimer">⌫</button></div></div>`}
function render(){const need=xpNeed(state.level),pct=Math.min(100,state.xp/need*100);[['topLevel',state.level],['topRank',rank()],['topFragments',state.fragments],['topGold',state.gold],['topStreak',state.streak],['xpNow',state.xp],['xpNeed',need],['heroLevel',state.level],['skillsRank',rank()]].forEach(([id,v])=>$('#'+id).textContent=v);$('#xpBar').style.width=pct+'%';renderToday();renderPlanner();renderSuggestions();renderSkills();renderJournal();renderSettings();save()}
function renderToday(){const tasks=state.tasks.filter(t=>t.period==='daily'),done=tasks.filter(t=>t.done).length,pct=tasks.length?Math.round(done/tasks.length*100):0;$('#completionPercent').textContent=pct+' %';$('#dailySummary').textContent=tasks.length?`${done} quête${done>1?'s':''} accomplie${done>1?'s':''} sur ${tasks.length}.`:'Aucune quête active : génère une sélection pour commencer.';$('#todayTasks').innerHTML=tasks.length?tasks.map(taskMarkup).join(''):'<div class="empty">Ton registre du jour est vide.</div>';const gains=Object.fromEntries(SKILLS.map(s=>[s[0],0]));tasks.filter(t=>t.done).forEach(t=>gains[t.skill]+=t.difficulty*3);$('#todaySkills').innerHTML=SKILLS.map(([id,icon,name])=>`<div class="skill-mini"><div><small>${icon} ${name}</small><b>+${gains[id]}</b></div><div class="mini-bar"><i style="width:${Math.min(100,gains[id]*5)}%"></i></div></div>`).join('');if(!quick)quick=pickSuggestions(1)[0];renderQuick()}
function renderQuick(){if(!quick){$('#quickSuggestion').innerHTML='<div class="empty">Aucune suggestion disponible.</div>';return}const [ci,cn]=catInfo(quick.category),r=rewards(quick.difficulty);$('#quickSuggestion').innerHTML=`<div class="quick-card"><div class="big-icon">${ci}</div><h4>${escape(quick.title)}</h4><p>${escape(quick.description)}</p><p class="reward">${cn} · +${r.xp} XP</p><button class="gold-button" data-add-library="${quick.id}">Ajouter aujourd’hui</button></div>`}
function renderPlanner(){let list=[...state.tasks],q=$('#taskSearch')?.value?.toLowerCase()||'',status=$('#taskStatus')?.value||'all',cat=$('#taskCategory')?.value||'all',period=$('#taskPeriod')?.value||'all';if(q)list=list.filter(t=>(t.title+' '+t.description).toLowerCase().includes(q));if(status==='active')list=list.filter(t=>!t.done);if(status==='done')list=list.filter(t=>t.done);if(cat!=='all')list=list.filter(t=>t.category===cat);if(period!=='all')list=list.filter(t=>t.period===period);list.sort((a,b)=>Number(a.done)-Number(b.done)||b.created.localeCompare(a.created));$('#plannerTasks').innerHTML=list.length?list.map(taskMarkup).join(''):'<div class="empty">Aucune tâche ne correspond aux filtres.</div>'}
function suggestionMarkup(q){const [ci,cn]=catInfo(q.category),[,,sn]=skillInfo(q.skill),r=rewards(q.difficulty);return `<article class="panel ornate suggestion-card"><div class="suggest-icon">${ci}</div><h3>${escape(q.title)}</h3><p>${escape(q.description)}</p><div class="task-meta"><span class="tag">${cn}</span><span class="tag">${sn}</span><span class="tag">${'★'.repeat(q.difficulty)}</span></div><footer><span>+${r.xp} XP</span><button class="gold-button" data-add-library="${q.id}">Ajouter</button></footer></article>`}
function renderSuggestions(){const cats=[['all','✦','Toutes'],...Object.entries(CATEGORIES).map(([id,[icon,name]])=>[id,icon,name])];$('#categoryChips').innerHTML=cats.map(([id,icon,name])=>`<button class="chip ${selectedCategory===id?'active':''}" data-category-chip="${id}">${icon} ${name}</button>`).join('');let pool=enabledLibrary().filter(q=>selectedCategory==='all'||q.category===selectedCategory);$('#suggestionGrid').innerHTML=pool.map(suggestionMarkup).join('')}
function renderSkills(){$('#skillsGrid').innerHTML=SKILLS.map(([id,icon,name,desc])=>{const v=state.skills[id]||0,level=Math.floor(v/100)+1,progress=v%100;return `<article class="panel ornate skill-card"><div class="skill-emblem">${icon}</div><div><h3>${name}</h3><p>${desc}</p></div><div class="skill-number">${v}</div><div class="skill-progress"><div class="xp-line"><small>Niveau ${level}</small><small>${progress}/100</small></div><div class="bar"><i style="width:${progress}%"></i></div></div></article>`}).join('')}
function renderJournal(){const e=[...state.journal].sort((a,b)=>b.date.localeCompare(a.date));$('#journalList').innerHTML=e.map(x=>`<article class="panel ornate journal-entry"><time>${new Date(x.date).toLocaleString('fr-FR',{dateStyle:'long',timeStyle:'short'})}</time><h3>${escape(x.title)}</h3><p>${escape(x.text)}</p></article>`).join('')}
function renderSettings(){$('#dailyCount').value=state.settings.dailyCount;$('#avoidRepeats').checked=state.settings.avoidRepeats;$('#balancedSkills').checked=state.settings.balancedSkills;$('#settingsCategories').innerHTML=Object.entries(CATEGORIES).map(([id,[icon,name]])=>`<label><input type="checkbox" data-setting-category="${id}" ${state.settings.enabledCategories[id]!==false?'checked':''}><span>${icon} ${name}</span></label>`).join('')}
function generateDay(){const count=Number(state.settings.dailyCount)||5,picks=pickSuggestions(count);picks.forEach(q=>{if(!state.tasks.some(t=>!t.done&&t.sourceId===q.id))state.tasks.push({id:uid(),sourceId:q.id,title:q.title,description:q.description,category:q.category,skill:q.skill,difficulty:q.difficulty,period:'daily',done:false,created:new Date().toISOString()})});toast(`${picks.length} quêtes proposées`);render()}
function openView(name){$$('.view').forEach(v=>v.classList.toggle('active',v.id===`view-${name}`));$$('#mainNav button').forEach(b=>b.classList.toggle('active',b.dataset.view===name));scrollTo({top:0,behavior:'smooth'})}
function setup(){const catOpts=Object.entries(CATEGORIES).map(([id,[icon,name]])=>`<option value="${id}">${icon} ${name}</option>`).join('');$('#formCategory').innerHTML=catOpts;$('#taskCategory').innerHTML='<option value="all">Toutes les catégories</option>'+catOpts;$('#formSkill').innerHTML=SKILLS.map(([id,icon,name])=>`<option value="${id}">${icon} ${name}</option>`).join('');for(let i=0;i<32;i++){const p=document.createElement('i');p.className='particle';const s=2+Math.random()*3;p.style.width=p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.animationDuration=7+Math.random()*11+'s';p.style.animationDelay=-Math.random()*18+'s';p.style.setProperty('--drift',(Math.random()*180-90)+'px');$('#particles').appendChild(p)}}
document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.view)openView(b.dataset.view);if(b.hasAttribute('data-open-task'))$('#taskDialog').showModal();if(b.dataset.complete)completeTask(b.dataset.complete);if(b.dataset.delete){state.tasks=state.tasks.filter(t=>t.id!==b.dataset.delete);render()}if(b.dataset.addLibrary){const q=LIBRARY.find(x=>x.id===b.dataset.addLibrary);if(q)addFromLibrary(q)}if(b.dataset.categoryChip){selectedCategory=b.dataset.categoryChip;renderSuggestions()}});
$('#generateDay').addEventListener('click',generateDay);$('#generateFive').addEventListener('click',()=>{$('#suggestionGrid').innerHTML=pickSuggestions(5,selectedCategory).map(suggestionMarkup).join('')});$('#refreshQuickSuggestion').addEventListener('click',()=>{quick=pickSuggestions(1)[0];renderQuick()});$('#clearCompleted').addEventListener('click',()=>{state.tasks=state.tasks.filter(t=>!(t.period==='daily'&&t.done));render()});
['taskSearch','taskStatus','taskCategory','taskPeriod'].forEach(id=>$('#'+id).addEventListener(id==='taskSearch'?'input':'change',renderPlanner));
$('#taskForm').addEventListener('submit',e=>{if(e.submitter?.value!=='default')return;const f=new FormData(e.currentTarget),difficulty=Number(f.get('difficulty'));state.tasks.push({id:uid(),title:String(f.get('title')),description:String(f.get('description')),category:String(f.get('category')),skill:String(f.get('skill')),difficulty,period:String(f.get('period')),done:false,created:new Date().toISOString()});e.currentTarget.reset();toast('Quête créée');render()});
$('#dailyCount').addEventListener('change',e=>{state.settings.dailyCount=Number(e.target.value);save()});$('#avoidRepeats').addEventListener('change',e=>{state.settings.avoidRepeats=e.target.checked;save()});$('#balancedSkills').addEventListener('change',e=>{state.settings.balancedSkills=e.target.checked;save()});$('#settingsCategories').addEventListener('change',e=>{if(e.target.dataset.settingCategory){state.settings.enabledCategories[e.target.dataset.settingCategory]=e.target.checked;save();renderSuggestions()}});
$('#exportSave').addEventListener('click',()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ascension-ylinor-sauvegarde.json';a.click();URL.revokeObjectURL(a.href)});$('#importSave').addEventListener('change',async e=>{try{const data=JSON.parse(await e.target.files[0].text());state=merge(clone(DEFAULT),data);render();toast('Sauvegarde importée')}catch{toast('Fichier invalide')}});$('#resetSave').addEventListener('click',()=>{if(confirm('Effacer toute la progression ?')){state=clone(DEFAULT);render();toast('Nouvelle Ascension commencée')}});
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).finally(()=>caches?.keys?.().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))))}setup();render();})();