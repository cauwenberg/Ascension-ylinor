const STORAGE='ascension_yln_v3';
const STATS={power:['⚔️','Puissance'],resistance:['🛡️','Résistance'],endurance:['🏃','Endurance'],knowledge:['📖','Savoir'],creation:['🌀','Création'],discipline:['⚖️','Discipline'],influence:['🗣️','Influence'],vitality:['🌿','Vitalité'],soul:['✨','Âme'],wisdom:['👁️','Sagesse']};
const NAV=[['dashboard','✥','Accueil'],['quests','📜','Quêtes'],['character','♟','Personnage'],['world','🗺️','Ylinor'],['shop','💰','Boutique'],['achievements','🏆','Succès'],['calendar','▦','Calendrier'],['journal','▣','Journal']];
const REGIONS=[['forge','⚒️','Forge éthérienne','Travaux, maison et création.',1],['academy','🏛️','Académie de Vinraës','Cours, enseignement et transmission.',2],['archives','📚','Archives des Érudits','JDR, lecture et écriture.',4],['sanctuary','🌿','Sanctuaire de Mélénas','Santé, repos et équilibre.',6],['guild','⚔️','Guilde de Bénathor','Sport, endurance et défis.',9],['senacle','◈','Sénacle','Décisions et grands objectifs.',12],['argenty','🌫️','Argenty','Mémoire, mystères et exploration.',16],['lente','🏴‍☠️','Lente Cuve','Détente, récompenses et liberté.',20],['ethere','⚙️','Territoires éthériens','Innovation et projets ambitieux.',25]];
const SHOP=[['cape','🧥','Cape du Vagabond',180,'soul','accessory','cape'],['halo','✧','Halo d’Andarë',260,'soul','accessory','halo'],['crown','♛','Couronne du Sénacle',450,'soul','accessory','crown'],['mask','🎭','Masque de l’Orfèvre',320,'soul','head','mask'],['armor','🛡️','Armure éthérienne',500,'soul','torso','armor'],['robe','🧙','Robe des Astromanciens',280,'soul','torso','robe'],['title1','📜','Titre : Façonneur',90,'gold','title','Le Façonneur'],['title2','🔥','Titre : Inébranlable',140,'gold','title','L’Inébranlable']];
const ACHIEVEMENTS=[['first','✦','Premier Pas','Accomplir une première quête',s=>s.completed>=1],['ten','⚔️','Aventurier','Accomplir 10 quêtes',s=>s.completed>=10],['level5','♜','Ascendant','Atteindre le niveau 5',s=>s.level>=5],['rich','💠','Collectionneur d’âmes','Posséder 500 fragments',s=>s.souls>=500],['streak7','🔥','Sept jours de braise','Atteindre 7 jours de série',s=>s.streak>=7],['creator','🌀','Façonneur','Atteindre 100 en Création',s=>s.stats.creation>=100]];
const AVATAR_PARTS={
 head:[['human','Humaine'],['sharp','Éthérienne'],['bearded','Barblanc'],['mask','Masquée']],
 hair:[['short','Court'],['long','Long'],['mohawk','Crête'],['hood','Capuche'],['none','Aucun']],
 torso:[['tunic','Tunique'],['armor','Armure'],['robe','Robe'],['leather','Cuir']],
 arms:[['bare','Nus'],['sleeves','Manches'],['bracers','Brassards'],['gauntlets','Gantelets']],
 legs:[['trousers','Pantalon'],['armor','Jambières'],['robe','Robe longue'],['boots','Bottes hautes']],
 accessory:[['none','Aucun'],['cape','Cape'],['halo','Halo'],['crown','Couronne'],['staff','Bâton'],['sword','Épée']]
};
const DEFAULT_AVATAR={head:'human',hair:'short',torso:'tunic',arms:'sleeves',legs:'trousers',accessory:'none',skin:'#c98f6d',hairColor:'#2b1711',clothColor:'#4f2e67',metalColor:'#b9833f',auraColor:'#765cff'};
const DEFAULT={name:'Pierre',title:'Le Novice',level:1,xp:0,souls:120,gold:40,streak:0,completed:0,stats:Object.fromEntries(Object.keys(STATS).map(k=>[k,0])),quests:[{id:'q1',title:'Le Souffle des Anciens',description:'Faire 20 minutes de vélo elliptique.',type:'daily',difficulty:2,stat:'endurance',xp:60,done:false},{id:'q2',title:'Former les Apprentis',description:'Préparer ou améliorer un cours.',type:'weekly',difficulty:3,stat:'knowledge',xp:90,done:false},{id:'q3',title:'Façonner la Grotte',description:'Appliquer le crépi sur une nouvelle zone.',type:'epic',difficulty:4,stat:'creation',xp:160,done:false}],journal:[],activity:{},owned:[],unlockedAchievements:[],avatar:{...DEFAULT_AVATAR}};
let state=load(),activeQuestTab='all',calendarCursor=new Date(),draftAvatar=structuredClone(state.avatar);
function load(){try{const old=JSON.parse(localStorage.getItem(STORAGE)||localStorage.getItem('ascension_yln_v2')||'null');if(!old)return structuredClone(DEFAULT);return {...structuredClone(DEFAULT),...old,stats:{...DEFAULT.stats,...old.stats},avatar:typeof old.avatar==='object'?{...DEFAULT_AVATAR,...old.avatar}:{...DEFAULT_AVATAR}}}catch{return structuredClone(DEFAULT)}}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));checkAchievements();renderAll()}
function rankFor(l){return l>=30?'S':l>=23?'A':l>=17?'B':l>=12?'C':l>=8?'D':l>=4?'E':'F'}
function xpNeed(l){return 100+Math.floor((l-1)*55+(l-1)**1.45*18)}
function addXP(amount){state.xp+=amount;let leveled=false;while(state.xp>=xpNeed(state.level)){state.xp-=xpNeed(state.level);state.level++;state.souls+=50+state.level*10;leveled=true}if(leveled)toast(`Niveau ${state.level} atteint — Ylinor te reconnaît.`)}
function today(){return new Date().toISOString().slice(0,10)}
function completeQuest(id){const q=state.quests.find(x=>x.id===id);if(!q||q.done)return;q.done=true;state.completed++;addXP(q.xp);state.souls+=Math.round(q.xp*.6);state.gold+=Math.max(1,Math.round(q.difficulty*2));state.stats[q.stat]=(state.stats[q.stat]||0)+Math.round(q.xp*.4);state.activity[today()]=(state.activity[today()]||0)+1;updateStreak();state.journal.unshift({id:crypto.randomUUID(),date:new Date().toISOString(),title:`Quête accomplie : ${q.title}`,text:`L’Ascendant a triomphé de « ${q.title} ». +${q.xp} XP et la vertu ${STATS[q.stat][1]} a progressé.`});save();burstRewards()}
function updateStreak(){const keys=Object.keys(state.activity).sort();let count=0,d=new Date();for(let i=0;i<366;i++){const k=d.toISOString().slice(0,10);if(state.activity[k])count++;else if(i>0)break;d.setDate(d.getDate()-1)}state.streak=count}
function checkAchievements(){for(const [id,icon,name,desc,test] of ACHIEVEMENTS){if(!state.unlockedAchievements.includes(id)&&test(state)){state.unlockedAchievements.push(id);state.souls+=75;state.journal.unshift({id:crypto.randomUUID(),date:new Date().toISOString(),title:`Succès débloqué : ${name}`,text:`${desc}. Le royaume t’accorde 75 fragments d’âme.`})}}}
function renderNav(){document.getElementById('nav').innerHTML=NAV.map(([id,ico,label],i)=>`<button class="${i===0?'active':''}" data-nav="${id}">${ico} ${label}</button>`).join('')}
function navTo(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id+'View'));document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.nav===id));scrollTo({top:0,behavior:'smooth'})}
function renderHeader(){const need=xpNeed(state.level),pct=Math.min(100,state.xp/need*100);for(const id of ['topName','characterName','profileName'])document.getElementById(id).textContent=state.name;for(const id of ['topTitle','characterTitle','profileTitle'])document.getElementById(id).textContent=state.title;document.getElementById('topLevel').textContent=state.level;document.getElementById('rankLabel').textContent=rankFor(state.level);document.getElementById('xpLabel').textContent=state.xp;document.getElementById('xpNextLabel').textContent=need;document.getElementById('xpBar').style.width=pct+'%';document.getElementById('soulCount').textContent=state.souls;document.getElementById('goldCount').textContent=state.gold;document.getElementById('streakCount').textContent=state.streak;document.getElementById('topSoulCount').textContent=state.souls;document.getElementById('topGoldCount').textContent=state.gold;renderAvatarInto('avatarPreview',state.avatar);renderAvatarInto('avatarLarge',state.avatar)}
function questHTML(q){return `<article class="quest-card ${q.done?'done':''}"><div><h3>${escapeHtml(q.title)}</h3><p>${escapeHtml(q.description||'')}</p><div class="quest-meta">${labelType(q.type)} · ${'★'.repeat(q.difficulty)} · ${STATS[q.stat][0]} ${STATS[q.stat][1]}</div><div class="quest-reward">+${q.xp} XP · +${Math.round(q.xp*.6)} fragments</div></div><div class="quest-actions">${q.done?'<span>Accomplie</span>':`<button class="check" data-complete="${q.id}">✓</button>`}<button class="ghost small" data-delete="${q.id}">🗑</button></div></article>`}
function renderDashboard(){const active=state.quests.find(q=>!q.done)||state.quests[0];document.getElementById('featuredQuest').innerHTML=active?`<h2>${escapeHtml(active.title)}</h2><p>${escapeHtml(active.description)}</p><p class="quest-reward">${'★'.repeat(active.difficulty)} · +${active.xp} XP</p>${active.done?'':`<button class="primary" data-complete="${active.id}">Accomplir</button>`}`:'<p>Aucune quête active.</p>';document.getElementById('dailyQuestList').innerHTML=state.quests.filter(q=>q.type==='daily').slice(0,4).map(questHTML).join('')||'<p>Aucune quête quotidienne.</p>';document.getElementById('statMiniGrid').innerHTML=Object.entries(STATS).slice(0,6).map(([k,[i,n]])=>`<div class="stat-chip">${i} ${n}<b>${state.stats[k]}</b></div>`).join('');document.getElementById('worldMini').innerHTML=REGIONS.slice(0,4).map(r=>`<div class="region-line"><span>${r[1]} ${r[2]}</span><b>${state.level>=r[4]?'Débloquée':`Niv. ${r[4]}`}</b></div>`).join('');const j=state.journal[0];document.getElementById('recentJournal').innerHTML=j?`<b>${escapeHtml(j.title)}</b><p>${escapeHtml(j.text)}</p>`:'<p>Aucune chronique.</p>'}
function renderQuests(){document.getElementById('questTabs').innerHTML=[['all','Toutes'],['daily','Quotidiennes'],['weekly','Hebdomadaires'],['epic','Épiques'],['done','Accomplies']].map(([id,l])=>`<button data-qtab="${id}" class="${activeQuestTab===id?'active':''}">${l}</button>`).join('');let qs=state.quests;if(activeQuestTab==='done')qs=qs.filter(q=>q.done);else if(activeQuestTab!=='all')qs=qs.filter(q=>q.type===activeQuestTab);document.getElementById('questBoard').innerHTML=qs.map(questHTML).join('')||'<div class="panel">Aucune quête ici.</div>'}
function renderCharacter(){document.getElementById('statsGrid').innerHTML=Object.entries(STATS).map(([k,[i,n]])=>{const v=state.stats[k]||0,lvl=Math.floor(v/100)+1;return `<div class="stat-card"><div class="xp-line"><span>${i} ${n}</span><b>Niv. ${lvl}</b></div><div class="progress"><i style="width:${v%100}%"></i></div><small>${v%100} / 100</small></div>`}).join('')}
function renderWorld(){const unlocked=REGIONS.filter(r=>state.level>=r[4]).length;document.getElementById('worldProgressText').textContent=`${unlocked}/${REGIONS.length} régions découvertes`;document.getElementById('worldMap').innerHTML=REGIONS.map(r=>`<article class="region-card ${state.level<r[4]?'locked':''}"><span class="region-level">${state.level>=r[4]?'Accessible':`Niveau ${r[4]}`}</span><div class="region-icon">${r[1]}</div><h3>${r[2]}</h3><p>${r[3]}</p><small>${state.level>=r[4]?'La région répond à ton influence.':'Encore plongée dans le brouillard.'}</small></article>`).join('')}
function renderShop(){document.getElementById('shopSoulCount').textContent=state.souls;document.getElementById('shopGoldCount').textContent=state.gold;document.getElementById('shopGrid').innerHTML=SHOP.map(i=>{const owned=state.owned.includes(i[0]);return `<article class="shop-item ${owned?'owned':''}"><div class="shop-icon">${i[1]}</div><h3>${i[2]}</h3><p>${owned?'Possédé':`${i[4]==='soul'?'💠':'🪙'} ${i[3]}`}</p><button class="${owned?'ghost':'primary'}" ${owned?'disabled':''} data-buy="${i[0]}">${owned?'Acquis':'Acheter'}</button></article>`}).join('')}
function buyItem(id){const i=SHOP.find(x=>x[0]===id);if(!i||state.owned.includes(id))return;const key=i[4]==='soul'?'souls':'gold';if(state[key]<i[3])return toast('Ressources insuffisantes');state[key]-=i[3];state.owned.push(id);if(i[5]==='title')state.title=i[6];else state.avatar[i[5]]=i[6];save();toast(`${i[2]} acquis`)}
function renderAchievements(){document.getElementById('achievementCount').textContent=`${state.unlockedAchievements.length}/${ACHIEVEMENTS.length} débloqués`;document.getElementById('achievementGrid').innerHTML=ACHIEVEMENTS.map(a=>{const u=state.unlockedAchievements.includes(a[0]);return `<article class="achievement ${u?'unlocked':''}"><div class="achievement-icon">${u?a[1]:'🔒'}</div><h3>${a[2]}</h3><p>${a[3]}</p><small>${u?'Débloqué · +75 fragments':'Non débloqué'}</small></article>`}).join('')}
function renderCalendar(){document.getElementById('calendarStreak').textContent=state.streak;document.getElementById('calendarTitle').textContent=calendarCursor.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});const first=new Date(calendarCursor.getFullYear(),calendarCursor.getMonth(),1),start=new Date(first);start.setDate(start.getDate()-((first.getDay()+6)%7));let html=['L','M','M','J','V','S','D'].map(x=>`<div class="calendar-cell"><b>${x}</b></div>`).join('');for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=d.toISOString().slice(0,10),same=d.getMonth()===calendarCursor.getMonth(),td=key===today(),active=state.activity[key];html+=`<div class="calendar-cell ${same?'':'muted'} ${active?'active-day':''} ${td?'today':''}"><b>${d.getDate()}</b>${active?`<div>⚔️ ${active}</div>`:''}</div>`}document.getElementById('calendarGrid').innerHTML=html;document.getElementById('streakRewards').innerHTML=[[3,'30 fragments'],[7,'Coffre rare'],[30,'Titre exclusif'],[100,'Trophée légendaire']].map(([n,r])=>`<div class="reward-line"><b>${n} jours</b><span style="float:right">${state.streak>=n?'✅':'🔒'} ${r}</span></div>`).join('')}
function renderJournal(){document.getElementById('journalList').innerHTML=state.journal.map(j=>`<article class="journal-entry"><time>${new Date(j.date).toLocaleString('fr-FR')}</time><h3>${escapeHtml(j.title)}</h3><p>${escapeHtml(j.text)}</p></article>`).join('')}
function renderAll(){renderHeader();renderDashboard();renderQuests();renderCharacter();renderWorld();renderShop();renderAchievements();renderCalendar();renderJournal()}
function labelType(t){return t==='daily'?'Quotidienne':t==='weekly'?'Hebdomadaire':'Épique'}
function escapeHtml(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2600)}
function openQuest(){document.getElementById('questForm').reset();document.getElementById('questDialog').showModal()}
function openAvatar(){draftAvatar=structuredClone(state.avatar);const f=document.getElementById('avatarForm');f.name.value=state.name;f.title.value=state.title;for(const k of ['skin','hairColor','clothColor','metalColor','auraColor'])f[k].value=draftAvatar[k];renderAvatarControls();renderAvatarInto('avatarEditorPreview',draftAvatar);document.getElementById('avatarDialog').showModal()}
function renderAvatarControls(){document.getElementById('avatarPartControls').innerHTML=Object.entries(AVATAR_PARTS).map(([part,opts])=>`<div class="part-control"><h4>${({head:'Tête',hair:'Cheveux / couvre-chef',torso:'Torse',arms:'Bras',legs:'Jambes',accessory:'Accessoire'})[part]}</h4><div class="part-options">${opts.map(([id,label])=>`<button type="button" class="part-option ${draftAvatar[part]===id?'selected':''}" data-avatar-part="${part}" data-avatar-value="${id}">${label}</button>`).join('')}</div></div>`).join('')}
function renderAvatarInto(id,a){document.getElementById(id).innerHTML=avatarSVG(a)}
function avatarSVG(a){const skin=a.skin,hair=a.hairColor,cloth=a.clothColor,metal=a.metalColor,aura=a.auraColor;const head={human:`<ellipse cx="150" cy="105" rx="36" ry="43" fill="${skin}"/><path d="M132 115q18 16 36 0" fill="none" stroke="#673c2e" stroke-width="3"/>`,sharp:`<path d="M113 96q7-40 37-44 30 4 37 44l-12 45-25 14-25-14z" fill="${skin}"/><path d="M113 94l-19-12 20 31M187 94l19-12-20 31" fill="${skin}"/>`,bearded:`<ellipse cx="150" cy="103" rx="37" ry="43" fill="${skin}"/><path d="M113 113q37 67 74 0-8 56-37 64-29-8-37-64" fill="${hair}"/>`,mask:`<ellipse cx="150" cy="105" rx="37" ry="43" fill="${skin}"/><path d="M114 91q36-25 72 0v40q-36 26-72 0z" fill="#191519" stroke="${metal}" stroke-width="4"/><path d="M125 108h18M157 108h18" stroke="${aura}" stroke-width="5"/>`}[a.head];const hairShape={short:`<path d="M115 98q2-48 35-48 36 1 36 48-18-19-35-11-20-8-36 11" fill="${hair}"/>`,long:`<path d="M112 100q0-52 38-52 40 0 40 52v85l-22-20-18 10-18-10-22 20z" fill="${hair}"/>`,mohawk:`<path d="M142 62l8-44 10 44z" fill="${hair}"/><path d="M118 93q8-37 32-37 25 0 34 37-34-15-66 0" fill="${hair}"/>`,hood:`<path d="M104 113q0-74 46-78 47 4 47 78l-20 43-27 18-27-18z" fill="${cloth}" opacity=".96"/>`,none:''}[a.hair];const torso={tunic:`<path d="M92 180q58-38 116 0l18 117H74z" fill="${cloth}"/><path d="M124 166q26 28 52 0" fill="none" stroke="${metal}" stroke-width="5"/>`,armor:`<path d="M88 184q62-45 124 0l12 113H76z" fill="#32343a" stroke="${metal}" stroke-width="6"/><path d="M106 187l44 30 44-30M103 226h94M98 258h104" fill="none" stroke="${metal}" stroke-width="5"/>`,robe:`<path d="M94 176q56-35 112 0l30 181H64z" fill="${cloth}"/><path d="M150 182v174M108 210q42 30 84 0" stroke="${metal}" stroke-width="4" fill="none"/>`,leather:`<path d="M91 182q59-40 118 0l14 115H77z" fill="#5a3322"/><path d="M112 175l76 116M188 175l-76 116" stroke="${metal}" stroke-width="6"/>`}[a.torso];const arms={bare:`<path d="M92 188q-28 20-35 84l25 8 34-73M208 188q28 20 35 84l-25 8-34-73" fill="${skin}"/>`,sleeves:`<path d="M94 183q-32 16-43 89l36 10 34-78M206 183q32 16 43 89l-36 10-34-78" fill="${cloth}"/>`,bracers:`<path d="M94 183q-32 16-43 89l36 10 34-78M206 183q32 16 43 89l-36 10-34-78" fill="${skin}"/><path d="M52 246l38 10-8 31-38-10M248 246l-38 10 8 31 38-10" fill="${metal}"/>`,gauntlets:`<path d="M94 183q-32 16-43 89l36 10 34-78M206 183q32 16 43 89l-36 10-34-78" fill="#30343c" stroke="${metal}" stroke-width="5"/>`}[a.arms];const legs={trousers:`<path d="M91 285h55l-8 143H83zM154 285h55l8 143h-55z" fill="#2a2225"/><path d="M79 412h64v28H72zM157 412h64l7 28h-71z" fill="#171116"/>`,armor:`<path d="M91 285h55l-8 143H83zM154 285h55l8 143h-55z" fill="#353943" stroke="${metal}" stroke-width="5"/><path d="M77 409h66v31H70zM157 409h66l7 31h-73z" fill="#20232a"/>`,robe:`<path d="M76 278h148l25 162H51z" fill="${cloth}"/><path d="M150 286v150" stroke="${metal}" stroke-width="4"/>`,boots:`<path d="M91 285h55l-8 143H83zM154 285h55l8 143h-55z" fill="#3b2a23"/><path d="M76 352h67v88H66zM157 352h67l10 88h-77z" fill="#181313" stroke="${metal}" stroke-width="4"/>`}[a.legs];const accessories={none:'',cape:`<path d="M100 168q50-25 100 0l45 245-95 38-95-38z" fill="${cloth}" opacity=".72"/>`,halo:`<ellipse cx="150" cy="75" rx="60" ry="20" fill="none" stroke="${aura}" stroke-width="5" filter="url(#glow)"/>`,crown:`<path d="M118 65l12-28 20 23 20-23 13 28z" fill="${metal}" stroke="#f7d790" stroke-width="3"/>`,staff:`<path d="M246 120l-10 310" stroke="${metal}" stroke-width="8"/><path d="M218 119q18-40 36 0-18 32-36 0" fill="${aura}" filter="url(#glow)"/>`,sword:`<path d="M58 166l42 214" stroke="${metal}" stroke-width="9"/><path d="M43 170h44" stroke="#e4c27b" stroke-width="8"/><path d="M45 158l10-58 25 50z" fill="#b7c3d4"/>`}[a.accessory];return `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Avatar personnalisable"><defs><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><radialGradient id="aura"><stop stop-color="${aura}" stop-opacity=".45"/><stop offset="1" stop-color="${aura}" stop-opacity="0"/></radialGradient></defs><ellipse cx="150" cy="235" rx="135" ry="205" fill="url(#aura)"/><g>${accessories}</g><g>${legs}</g><g>${arms}</g><g>${torso}</g><g>${head}${hairShape}</g><circle cx="136" cy="102" r="3" fill="#120d0b"/><circle cx="164" cy="102" r="3" fill="#120d0b"/></svg>`}
function createAtmosphere(){const emb=document.getElementById('embers'),frag=document.getElementById('soulFragments');for(let i=0;i<42;i++){const e=document.createElement('i');e.className='ember';e.style.left=Math.random()*100+'%';e.style.animationDuration=7+Math.random()*16+'s';e.style.animationDelay=-Math.random()*20+'s';e.style.transform=`scale(${.4+Math.random()*1.5})`;emb.appendChild(e)}for(let i=0;i<12;i++){const f=document.createElement('i');f.className='fragment';f.style.left=Math.random()*100+'%';f.style.animationDuration=14+Math.random()*24+'s';f.style.animationDelay=-Math.random()*30+'s';f.style.transform=`scale(${.5+Math.random()})`;frag.appendChild(f)}}
function burstRewards(){for(let i=0;i<14;i++){const f=document.createElement('i');f.className='fragment';f.style.left=(45+Math.random()*10)+'%';f.style.bottom='45%';f.style.animationDuration=(1.5+Math.random()*1.5)+'s';document.getElementById('soulFragments').appendChild(f);setTimeout(()=>f.remove(),3200)}}
function initForms(){document.getElementById('questStatSelect').innerHTML=Object.entries(STATS).map(([k,[i,n]])=>`<option value="${k}">${i} ${n}</option>`).join('');document.getElementById('questForm').addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.target);state.quests.unshift({id:crypto.randomUUID(),title:f.get('title'),description:f.get('description'),type:f.get('type'),difficulty:+f.get('difficulty'),stat:f.get('stat'),xp:+f.get('xp'),done:false});document.getElementById('questDialog').close();save();toast('Quête ajoutée')});document.getElementById('avatarForm').addEventListener('input',e=>{if(['skin','hairColor','clothColor','metalColor','auraColor'].includes(e.target.name)){draftAvatar[e.target.name]=e.target.value;renderAvatarInto('avatarEditorPreview',draftAvatar)}});document.getElementById('avatarForm').addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.target);state.name=f.get('name')||state.name;state.title=f.get('title')||state.title;state.avatar=structuredClone(draftAvatar);document.getElementById('avatarDialog').close();save();toast('Apparence scellée')});document.getElementById('journalForm').addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.target);state.journal.unshift({id:crypto.randomUUID(),date:new Date().toISOString(),title:f.get('title'),text:f.get('text')});document.getElementById('journalDialog').close();e.target.reset();save()})}
document.addEventListener('click',e=>{const n=e.target.closest('[data-nav]');if(n)navTo(n.dataset.nav);const a=e.target.closest('[data-action]');if(a){if(a.dataset.action==='new-quest')openQuest();if(a.dataset.action==='open-avatar')openAvatar();if(a.dataset.action==='add-journal')document.getElementById('journalDialog').showModal();if(a.dataset.action==='prev-month'){calendarCursor.setMonth(calendarCursor.getMonth()-1);renderCalendar()}if(a.dataset.action==='next-month'){calendarCursor.setMonth(calendarCursor.getMonth()+1);renderCalendar()}}const c=e.target.closest('[data-complete]');if(c)completeQuest(c.dataset.complete);const d=e.target.closest('[data-delete]');if(d&&confirm('Supprimer cette quête ?')){state.quests=state.quests.filter(q=>q.id!==d.dataset.delete);save()}const t=e.target.closest('[data-qtab]');if(t){activeQuestTab=t.dataset.qtab;renderQuests()}const b=e.target.closest('[data-buy]');if(b)buyItem(b.dataset.buy);const p=e.target.closest('[data-avatar-part]');if(p){draftAvatar[p.dataset.avatarPart]=p.dataset.avatarValue;renderAvatarControls();renderAvatarInto('avatarEditorPreview',draftAvatar)}});
renderNav();initForms();createAtmosphere();checkAchievements();renderAll();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
